<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据分析</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
        }

        header h1 {
            display: inline-block;
        }

        header a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
        }

        main {
            padding: 20px;
        }

        section {
            margin-bottom: 20px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        .stats-panel {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            border: none;
            padding: 0;
        }

        @media (max-width: 1024px) {
            .stats-panel {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            .stats-panel {
                grid-template-columns: 1fr;
            }
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            text-align: center;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
        }

        .stat-icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 0.875rem;
            color: #666;
        }

        .error-message {
            color: #e74c3c;
            text-align: center;
            padding: 20px;
        }

        .chart-container {
            width: 100%;
            min-height: 400px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .chart-title {
            text-align: center;
            margin-bottom: 20px;
        }

        .chart-title h2 {
            font-size: 1.5rem;
            color: #333;
            margin-bottom: 8px;
        }

        .chart-title p {
            font-size: 0.875rem;
            color: #666;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 400px;
            color: #666;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>数据分析</h1>
        <a href="kanban.html">返回看板</a>
    </header>

    <main>
        <section id="stats-panel" class="stats-panel">
            <div class="stat-card">
                <div class="stat-icon">📊</div>
                <div class="stat-value" id="total-tasks">--</div>
                <div class="stat-label">任务总数</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📈</div>
                <div class="stat-value" id="completion-rate">--</div>
                <div class="stat-label">完成率</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">✅</div>
                <div class="stat-value" id="avg-hours">--</div>
                <div class="stat-label">平均天数</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">👥</div>
                <div class="stat-value" id="team-count">--</div>
                <div class="stat-label">团队成员</div>
            </div>
        </section>

        <section id="role-chart">
            <div class="chart-title">
                <h2>角色工时分布</h2>
                <p>各角色投入工时占比</p>
            </div>
            <div id="role-chart-container" class="chart-container">
                <div class="loading">加载中...</div>
            </div>
        </section>

        <section id="workload-chart">
            <div class="chart-title">
                <h2>工时类型分布</h2>
                <p>团队成员任务与非任务工时对比</p>
            </div>
            <div id="workload-chart-container" class="chart-container">
                <div class="loading">加载中...</div>
            </div>
        </section>
    </main>

    <script type="module" src="assets/js/pages/analytics-app.js"></script>
</body>
</html>
