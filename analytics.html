<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据分析</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
        }

        header h1 {
            display: inline-block;
        }

        header a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
        }

        main {
            padding: 20px;
        }

        section {
            margin-bottom: 20px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        .stats-panel {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            border: none;
            padding: 0;
        }

        @media (max-width: 1024px) {
            .stats-panel {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            .stats-panel {
                grid-template-columns: 1fr;
            }
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            text-align: center;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
        }

        .stat-icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 0.875rem;
            color: #666;
        }

        .error-message {
            color: #e74c3c;
            text-align: center;
            padding: 20px;
        }

        .chart-container {
            width: 100%;
            min-height: 400px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .chart-title {
            text-align: center;
            margin-bottom: 20px;
        }

        .chart-title h2 {
            font-size: 1.5rem;
            color: #333;
            margin-bottom: 8px;
        }

        .chart-title p {
            font-size: 0.875rem;
            color: #666;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 400px;
            color: #666;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>数据分析</h1>
        <a href="kanban.html">返回看板</a>
    </header>

    <main>
        <section id="stats-panel" class="stats-panel">
            <div class="stat-card">
                <div class="stat-icon">📊</div>
                <div class="stat-value" id="total-tasks">--</div>
                <div class="stat-label">任务总数</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📈</div>
                <div class="stat-value" id="completion-rate">--</div>
                <div class="stat-label">完成率</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">✅</div>
                <div class="stat-value" id="avg-hours">--</div>
                <div class="stat-label">平均天数</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">👥</div>
                <div class="stat-value" id="team-count">--</div>
                <div class="stat-label">团队成员</div>
            </div>
        </section>

        <section id="role-chart">
            <div class="chart-title">
                <h2>角色工时分布</h2>
                <p>各角色投入工时占比</p>
            </div>
            <div id="role-chart-container" class="chart-container">
                <div class="loading">加载中...</div>
            </div>
        </section>

        <section id="workload-chart">
            <p>工作量分布图表区域</p>
        </section>
    </main>

    <script>
        function calculateTaskDays(task) {
            let days = 0;
            if (task.participants && Array.isArray(task.participants)) {
                task.participants.forEach(p => {
                    days += parseFloat(p.estimated_days) || 0;
                });
            }
            if (task.reviewers && Array.isArray(task.reviewers)) {
                task.reviewers.forEach(r => {
                    days += parseFloat(r.estimated_days) || 0;
                });
            }
            return days;
        }

        function aggregateWorkDaysByRole(tasks, resourcePool) {
            const roleWorkDays = {};
            const rolePersonMap = {};
            
            resourcePool.forEach(person => {
                rolePersonMap[person.name] = person.roles;
                person.roles.forEach(role => {
                    if (!roleWorkDays[role]) {
                        roleWorkDays[role] = 0;
                    }
                });
            });
            
            tasks.forEach(task => {
                const allWorkers = [];
                if (task.participants && Array.isArray(task.participants)) {
                    allWorkers.push(...task.participants);
                }
                if (task.reviewers && Array.isArray(task.reviewers)) {
                    allWorkers.push(...task.reviewers);
                }
                
                allWorkers.forEach(worker => {
                    const personRoles = rolePersonMap[worker.name];
                    const estimatedDays = parseFloat(worker.estimated_days) || 0;
                    
                    if (personRoles && personRoles.length > 0) {
                        const daysPerRole = estimatedDays / personRoles.length;
                        personRoles.forEach(role => {
                            roleWorkDays[role] = (roleWorkDays[role] || 0) + daysPerRole;
                        });
                    }
                });
            });
            
            return roleWorkDays;
        }

        function initRoleDistributionChart(roleWorkDays) {
            const chartDom = document.getElementById('role-chart-container');
            
            if (!chartDom) {
                console.error('Chart container not found');
                return;
            }
            
            chartDom.innerHTML = '';
            
            const chart = echarts.init(chartDom);
            
            const data = Object.entries(roleWorkDays)
                .filter(([role, days]) => days > 0)
                .map(([role, days]) => ({
                    name: role,
                    value: days.toFixed(1)
                }));
            
            if (data.length === 0) {
                chartDom.innerHTML = '<div class="error-message">暂无角色工时数据</div>';
                return;
            }
            
            const option = {
                tooltip: {
                    trigger: 'item',
                    formatter: function(params) {
                        const total = data.reduce((sum, item) => sum + parseFloat(item.value), 0);
                        const percentage = ((parseFloat(params.value) / total) * 100).toFixed(1);
                        return `${params.name}<br/>工时: ${params.value}天<br/>占比: ${percentage}%`;
                    }
                },
                legend: {
                    orient: 'horizontal',
                    bottom: '5%',
                    left: 'center',
                    type: 'scroll',
                    textStyle: {
                        fontSize: 12
                    }
                },
                color: ['#667eea', '#764ba2', '#f093fb', '#f5576c', '#4facfe', '#00f2fe'],
                series: [
                    {
                        name: '角色工时',
                        type: 'pie',
                        radius: ['40%', '70%'],
                        center: ['50%', '45%'],
                        avoidLabelOverlap: true,
                        itemStyle: {
                            borderRadius: 10,
                            borderColor: '#fff',
                            borderWidth: 2
                        },
                        label: {
                            show: true,
                            position: 'outside',
                            formatter: '{b}: {d}%',
                            fontSize: 12
                        },
                        labelLine: {
                            show: true,
                            length: 15,
                            length2: 10,
                            smooth: true
                        },
                        emphasis: {
                            label: {
                                show: true,
                                fontSize: 14,
                                fontWeight: 'bold'
                            },
                            itemStyle: {
                                shadowBlur: 10,
                                shadowOffsetX: 0,
                                shadowColor: 'rgba(0, 0, 0, 0.5)'
                            }
                        },
                        data: data
                    }
                ]
            };
            
            chart.setOption(option);
            
            window.addEventListener('resize', function() {
                chart.resize();
            });
        }

        async function calculateStats() {
            const totalTasksEl = document.getElementById('total-tasks');
            const completionRateEl = document.getElementById('completion-rate');
            const avgHoursEl = document.getElementById('avg-hours');
            const teamCountEl = document.getElementById('team-count');

            try {
                console.log('Fetching data files...');
                const [configRes, tasksRes] = await Promise.all([
                    fetch('data/projects/xiyouji/config.json'),
                    fetch('data/projects/xiyouji/tasks.json')
                ]);

                console.log('Config response:', configRes.ok, configRes.status);
                console.log('Tasks response:', tasksRes.ok, tasksRes.status);

                if (!configRes.ok || !tasksRes.ok) {
                    throw new Error(`Failed to load data files: config=${configRes.status}, tasks=${tasksRes.status}`);
                }

                const config = await configRes.json();
                const tasksData = await tasksRes.json();
                const tasks = tasksData.tasks || [];
                console.log('Loaded tasks:', tasks.length, 'config:', config.project_name);

                const totalTasks = tasks.length;
                const completedTasks = tasks.filter(t => t.status === '已完成').length;
                const completionRate = totalTasks > 0 
                    ? (completedTasks / totalTasks * 100).toFixed(1) 
                    : 0;
                const totalDays = tasks.reduce((sum, t) => sum + calculateTaskDays(t), 0);
                const avgDays = totalTasks > 0 
                    ? (totalDays / totalTasks).toFixed(1) 
                    : 0;
                const teamCount = config.resource_pool ? config.resource_pool.length : 0;

                console.log('Stats calculated:', { totalTasks, completedTasks, completionRate, totalDays, avgDays, teamCount });

                totalTasksEl.textContent = totalTasks;
                completionRateEl.textContent = completionRate + '%';
                avgHoursEl.textContent = avgDays + '天';
                teamCountEl.textContent = teamCount;

                const roleWorkDays = aggregateWorkDaysByRole(tasks, config.resource_pool || []);
                console.log('Role work days:', roleWorkDays);
                initRoleDistributionChart(roleWorkDays);
            } catch (error) {
                console.error('Error loading statistics:', error);
                console.error('Stack trace:', error.stack);
                totalTasksEl.textContent = '--';
                completionRateEl.textContent = '--';
                avgHoursEl.textContent = '--';
                teamCountEl.textContent = '--';
                
                const statsPanel = document.getElementById('stats-panel');
                const existingError = statsPanel.querySelector('.error-message');
                if (!existingError) {
                    const errorMsg = document.createElement('div');
                    errorMsg.className = 'error-message';
                    errorMsg.textContent = '统计数据加载失败: ' + error.message;
                    statsPanel.appendChild(errorMsg);
                }
                
                const chartContainer = document.getElementById('role-chart-container');
                if (chartContainer) {
                    chartContainer.innerHTML = '<div class="error-message">图表加载失败: ' + error.message + '</div>';
                }
            }
        }

        document.addEventListener('DOMContentLoaded', calculateStats);
    </script>
</body>
</html>
