<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据分析</title>
    <link rel="stylesheet" href="assets/css/base.css">
    <link rel="stylesheet" href="assets/css/page-shell.css">
    <link rel="stylesheet" href="assets/css/analytics.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</head>
<body class="page-shell">
    <div class="page-frame">
        <header class="page-header">
            <div class="page-heading">
                <div class="page-kicker">Analytics Overview</div>
                <h1 class="page-title">数据分析</h1>
                <p class="page-subtitle">统一读取项目配置、任务数据与非任务工时，从角色投入、成员负荷和完成情况三个维度观察本轮迭代。</p>
            </div>
            <nav class="page-nav" aria-label="主导航">
                <a class="page-nav-link" href="index.html">首页</a>
                <a class="page-nav-link" href="kanban.html">看板</a>
                <a class="page-nav-link" href="heatmap.html">热力图</a>
                <a class="page-nav-link is-active" href="analytics.html" aria-current="page">分析</a>
            </nav>
        </header>

        <main class="page-main analytics-layout">
            <section id="stats-panel" class="stats-grid">
                <div class="surface-card stat-card">
                    <div class="stat-icon">📊</div>
                    <div class="stat-value" id="total-tasks">--</div>
                    <div class="stat-label">任务总数</div>
                </div>
                <div class="surface-card stat-card">
                    <div class="stat-icon">📈</div>
                    <div class="stat-value" id="completion-rate">--</div>
                    <div class="stat-label">完成率</div>
                </div>
                <div class="surface-card stat-card">
                    <div class="stat-icon">⏱️</div>
                    <div class="stat-value" id="avg-hours">--</div>
                    <div class="stat-label">平均天数</div>
                </div>
                <div class="surface-card stat-card">
                    <div class="stat-icon">👥</div>
                    <div class="stat-value" id="team-count">--</div>
                    <div class="stat-label">团队成员</div>
                </div>
            </section>

            <section class="surface-card chart-section" id="role-chart">
                <div class="section-header">
                    <div>
                        <h2 class="section-title">角色工时分布</h2>
                        <p class="section-copy">根据资源池中的角色映射，将任务工时按成员职责分摊。</p>
                    </div>
                </div>
                <div id="role-chart-container" class="chart-container">
                    <div class="loading-state">加载图表中...</div>
                </div>
            </section>

            <section class="surface-card chart-section" id="workload-chart">
                <div class="section-header">
                    <div>
                        <h2 class="section-title">工时类型分布</h2>
                        <p class="section-copy">对比每位成员的任务工时与非任务工时，观察投入结构。</p>
                    </div>
                </div>
                <div id="workload-chart-container" class="chart-container">
                    <div class="loading-state">加载图表中...</div>
                </div>
            </section>
        </main>
    </div>

    <script type="module" src="assets/js/pages/analytics-app.js"></script>
</body>
</html>
