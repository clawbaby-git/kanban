<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人员负荷热力图</title>
    <link rel="stylesheet" href="assets/css/base.css">
    <link rel="stylesheet" href="assets/css/page-shell.css">
    <link rel="stylesheet" href="assets/css/heatmap.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</head>
<body class="page-shell">
    <div class="page-frame">
        <header class="page-header">
            <div class="page-heading">
                <div class="page-kicker">Workload Map</div>
                <h1 class="page-title">人员负荷热力图</h1>
                <p class="page-subtitle">按迭代日期展开成员工作量，将预估工时均摊到时间轴，快速识别过载和空闲区间。</p>
            </div>
            <nav class="page-nav" aria-label="主导航">
                <a class="page-nav-link" href="index.html">首页</a>
                <a class="page-nav-link" href="kanban.html">看板</a>
                <a class="page-nav-link is-active" href="heatmap.html" aria-current="page">热力图</a>
                <a class="page-nav-link" href="analytics.html">分析</a>
            </nav>
        </header>

        <main class="page-main heatmap-shell">
            <section class="surface-card heatmap-card">
                <div id="loading-overlay" class="loading-overlay">
                    <div class="loading-spinner"></div>
                    <div class="loading-text">正在加载数据...</div>
                </div>
                <div id="heatmap-chart" class="heatmap-chart"></div>
            </section>
        </main>
    </div>

    <div id="task-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">任务详情</h3>
                <button class="modal-close" data-action="close-heatmap-modal" aria-label="关闭">&times;</button>
            </div>
            <div class="modal-body">
                <div class="modal-info">
                    <p><strong>日期:</strong> <span id="modal-date"></span></p>
                    <p><strong>人员:</strong> <span id="modal-person"></span></p>
                    <p><strong>工作时长:</strong> <span id="modal-hours"></span> 小时</p>
                </div>
                <div id="modal-tasks"></div>
            </div>
        </div>
    </div>

    <script type="module" src="assets/js/pages/heatmap-app.js"></script>
</body>
</html>
