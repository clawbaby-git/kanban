<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件查看器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', monospace;
            background: #1e1e1e;
            color: #d4d4d4;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            background: #252526;
            padding: 10px 20px;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-shrink: 0;
        }
        .header h1 { font-size: 14px; font-weight: normal; color: #ccc; }
        .path-input {
            flex: 1;
            background: #3c3c3c;
            border: 1px solid #555;
            padding: 5px 10px;
            color: #d4d4d4;
            font-size: 13px;
            border-radius: 3px;
        }
        .btn {
            background: #0e639c;
            border: none;
            padding: 5px 15px;
            color: white;
            font-size: 13px;
            border-radius: 3px;
            cursor: pointer;
        }
        .btn:hover { background: #1177bb; }
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }
        .show-sidebar-btn {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            background: #0e639c;
            border: none;
            padding: 15px 8px;
            color: white;
            font-size: 18px;
            cursor: pointer;
            border-radius: 0 4px 4px 0;
            z-index: 1000;
            display: none;
        }
        .show-sidebar-btn:hover { background: #1177bb; }
        .show-sidebar-btn.visible { display: block; }
        .sidebar {
            width: 280px;
            min-width: 150px;
            max-width: 500px;
            background: #252526;
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .sidebar-header {
            padding: 10px 15px;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sidebar-title {
            font-size: 11px;
            text-transform: uppercase;
            color: #999;
            letter-spacing: 1px;
        }
        .toggle-btn {
            background: none;
            border: none;
            color: #999;
            cursor: pointer;
            font-size: 16px;
            padding: 0 5px;
        }
        .toggle-btn:hover { color: #fff; }
        .file-list {
            list-style: none;
            overflow-y: auto;
            flex: 1;
            padding: 5px 0;
        }
        .file-list li {
            padding: 6px 15px;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #ccc;
        }
        .file-list li:hover { background: #2a2d2e; color: #fff; }
        .file-list li.active { background: #094771; color: #fff; }
        .resizer {
            width: 4px;
            background: #333;
            cursor: col-resize;
            transition: background 0.2s;
        }
        .resizer:hover { background: #0e639c; }
        .content {
            flex: 1;
            background: #1e1e1e;
            overflow: auto;
            padding: 20px;
        }
        .content pre {
            margin: 0;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
            color: #d4d4d4;
        }
        .loading, .error, .empty {
            text-align: center;
            padding: 100px 20px;
            color: #666;
        }
        .error { color: #f48771; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="header">
        <h1>📂 文件查看器</h1>
        <input type="text" class="path-input" id="pathInput" placeholder="输入文件路径，如: docs/README.md" value="docs/README.md">
        <button class="btn" onclick="loadFile()">打开</button>
    </div>
    
    <div class="main">
        <button class="show-sidebar-btn" id="showSidebarBtn" onclick="toggleSidebar()" title="显示文件列表">»</button>
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-title">文件列表</span>
                <button class="toggle-btn" onclick="toggleSidebar()" title="隐藏">«</button>
            </div>
            <ul class="file-list" id="fileList">
                <li onclick="loadFileByPath('docs/README.md')" data-path="docs/README.md">docs/README.md</li>
                <li onclick="loadFileByPath('docs/requirements.md')" data-path="docs/requirements.md">docs/requirements.md</li>
                <li onclick="loadFileByPath('docs/mvp-plan.md')" data-path="docs/mvp-plan.md">docs/mvp-plan.md</li>
                <li onclick="loadFileByPath('data/projects/xiyouji/config.json')" data-path="data/projects/xiyouji/config.json">config.json</li>
                <li onclick="loadFileByPath('data/projects/xiyouji/tasks.json')" data-path="data/projects/xiyouji/tasks.json">tasks.json</li>
                <li onclick="loadFileByPath('data/projects/xiyouji/non-tasks.json')" data-path="data/projects/xiyouji/non-tasks.json">non-tasks.json</li>
            </ul>
        </div>
        <div class="resizer" id="resizer"></div>
        <div class="content" id="content">
            <div class="empty">
                <p>👈 点击左侧文件，或在上方输入路径打开</p>
                <p style="font-size: 12px; margin-top: 10px; opacity: 0.6;">纯文本查看器 - 支持任意文本文件</p>
            </div>
        </div>
    </div>

    <script>
        // 文件内容缓存
        const fileCache = {};
        let currentPath = '';
        let sidebarVisible = true;
        let isResizing = false;
        let startX, startWidth;
        
        // 初始化拖动调整大小
        function initResizer() {
            const resizer = document.getElementById('resizer');
            const sidebar = document.getElementById('sidebar');
            
            resizer.addEventListener('mousedown', (e) => {
                isResizing = true;
                startX = e.clientX;
                startWidth = parseInt(document.defaultView.getComputedStyle(sidebar).width, 10);
                document.body.style.cursor = 'col-resize';
                e.preventDefault();
            });
            
            document.addEventListener('mousemove', (e) => {
                if (!isResizing) return;
                const width = startWidth + e.clientX - startX;
                if (width >= 150 && width <= 500) {
                    sidebar.style.width = width + 'px';
                }
            });
            
            document.addEventListener('mouseup', () => {
                if (isResizing) {
                    isResizing = false;
                    document.body.style.cursor = 'default';
                }
            });
        }
        
        // 切换侧边栏显示/隐藏
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const resizer = document.getElementById('resizer');
            const showBtn = document.getElementById('showSidebarBtn');
            
            sidebarVisible = !sidebarVisible;
            
            if (sidebarVisible) {
                sidebar.style.display = 'flex';
                resizer.style.display = 'block';
                sidebar.style.width = '280px';
                showBtn.classList.remove('visible');
            } else {
                sidebar.style.display = 'none';
                resizer.style.display = 'none';
                showBtn.classList.add('visible');
            }
        }
        
        // 从输入框加载
        function loadFile() {
            const path = document.getElementById('pathInput').value.trim();
            if (!path) {
                showError('请输入文件路径');
                return;
            }
            loadFileByPath(path);
        }
        
        // 从路径加载
        async function loadFileByPath(path) {
            currentPath = path;
            document.getElementById('pathInput').value = path;
            
            // 更新激活状态
            document.querySelectorAll('.file-list li').forEach(li => {
                li.classList.remove('active');
                if (li.dataset.path === path) {
                    li.classList.add('active');
                }
            });
            
            // 检查缓存
            if (fileCache[path]) {
                showContent(path, fileCache[path]);
                return;
            }
            
            // 显示加载中
            document.getElementById('content').innerHTML = '<div class="loading">加载中...</div>';
            
            try {
                const response = await fetch(path);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                const content = await response.text();
                fileCache[path] = content;
                showContent(path, content);
            } catch (error) {
                showError(`加载失败: ${error.message}`);
            }
        }
        
        // 显示内容
        function showContent(path, content) {
            // HTML 转义
            const escaped = content
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
            
            document.getElementById('content').innerHTML = `<pre>${escaped}</pre>`;
        }
        
        // 显示错误
        function showError(message) {
            document.getElementById('content').innerHTML = `<div class="error">${message}</div>`;
        }
        
        // 回车键加载
        document.getElementById('pathInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                loadFile();
            }
        });
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            initResizer();
            console.log('文件查看器已就绪');
        });
    </script>
</body>
</html>
