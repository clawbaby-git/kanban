<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>看板 - 西游记项目</title>
        <link rel="stylesheet" href="assets/css/kanban.css">

</head>
<body>
    <!-- 顶部工具栏 -->
    <div class="toolbar">
        <div class="toolbar-content">
            <div class="logo">📋 西游记看板</div>
            
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索任务标题、ID或负责人..." autocomplete="off">
            </div>

            <div class="filter-group">
                <button class="filter-btn active" data-priority="all">全部</button>
                <button class="filter-btn" data-priority="高">高优先级</button>
                <button class="filter-btn" data-priority="中">中优先级</button>
                <button class="filter-btn" data-priority="低">低优先级</button>
            </div>

            <a href="heatmap.html" class="heatmap-link" title="查看人员负荷热力图">
                人员负荷
            </a>

            <a href="analytics.html" class="analytics-link" title="查看数据分析图表">
                数据分析
            </a>

            <div class="view-toggle">
                <button class="view-btn active" data-view="list">列表</button>
                <button class="view-btn" data-view="group">分组</button>
            </div>

            <button class="add-task-btn" id="addTaskBtn" data-action="open-task-modal" title="添加新任务">
                <span>➕</span> 添加任务
            </button>

            <button class="export-btn" data-action="export" title="导出任务数据">
                <span>📤</span> 导出
            </button>

            <button class="clear-btn" data-action="clear-session" title="清空会话数据">
                <span>🗑️</span> 清空
            </button>
        </div>
    </div>

    <!-- 统计面板 -->
    <div class="stats-panel" id="statsPanel">
        <div class="stats-drag-handle" id="statsDragHandle">📊 统计</div>
        <div class="stat-item">
            <div class="stat-value" id="totalTasks">0</div>
            <div class="stat-label">总任务</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
            <div class="stat-value" id="totalHours">0</div>
            <div class="stat-label">总工时(天)</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
            <div class="stat-value" id="completionRate">0%</div>
            <div class="stat-label">完成率</div>
        </div>
    </div>

    <!-- 看板容器 -->
    <div class="board-container">
        <div id="loading" class="loading">
            <div class="loading-spinner"></div>
            <div>加载任务数据...</div>
        </div>

        <div id="error" class="error" style="display: none;"></div>

        <div class="board" id="board" style="display: none;">
            <!-- 待办列 -->
            <div class="column todo" data-status="待办">
                <div class="column-header">
                    <span class="column-title">待办</span>
                    <div class="column-stats">
                        <span class="column-hours" id="todo-hours">0天</span>
                        <span class="column-count" id="todo-count">0</span>
                        <button class="collapse-btn" title="折叠/展开">▼</button>
                    </div>
                </div>
                <div class="task-list-container" id="todo-container">
                    <div class="task-list" id="todo-list"></div>
                </div>
                <div class="pagination" id="todo-pagination" style="display: none;"></div>
            </div>

            <!-- 进行中列 -->
            <div class="column in-progress" data-status="进行中">
                <div class="column-header">
                    <span class="column-title">进行中</span>
                    <div class="column-stats">
                        <span class="column-hours" id="progress-hours">0天</span>
                        <span class="column-count" id="progress-count">0</span>
                        <button class="collapse-btn" title="折叠/展开">▼</button>
                    </div>
                </div>
                <div class="task-list-container" id="progress-container">
                    <div class="task-list" id="progress-list"></div>
                </div>
                <div class="pagination" id="progress-pagination" style="display: none;"></div>
            </div>

            <!-- 已完成列 -->
            <div class="column done" data-status="已完成">
                <div class="column-header">
                    <span class="column-title">已完成</span>
                    <div class="column-stats">
                        <span class="column-hours" id="done-hours">0天</span>
                        <span class="column-count" id="done-count">0</span>
                        <button class="collapse-btn" title="折叠/展开">▼</button>
                    </div>
                </div>
                <div class="task-list-container" id="done-container">
                    <div class="task-list" id="done-list"></div>
                </div>
                <div class="pagination" id="done-pagination" style="display: none;"></div>
            </div>
        </div>
    </div>

    <!-- 快速导航 -->
    <div class="quick-nav" id="quickNav" style="display: none;">
        <button class="quick-nav-btn" data-action="scroll-column:todo" title="待办">📝</button>
        <button class="quick-nav-btn" data-action="scroll-column:progress" title="进行中">🚀</button>
        <button class="quick-nav-btn" data-action="scroll-column:done" title="已完成">✅</button>
        <button class="quick-nav-btn" data-action="scroll-top" title="回到顶部">⬆️</button>
    </div>

    <!-- 添加任务模态框 -->
    <div class="modal-overlay" id="taskModal">
        <div class="modal">
            <div class="modal-header">
                <h2>添加新任务</h2>
                <button class="modal-close" data-action="close-task-modal" title="关闭">×</button>
            </div>
            <form id="taskForm" class="modal-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="taskId">任务ID *</label>
                        <input type="text" id="taskId" name="taskId" required placeholder="例如: XY-026">
                    </div>
                    <div class="form-group">
                        <label for="taskTitle">任务标题 *</label>
                        <input type="text" id="taskTitle" name="taskTitle" required placeholder="请输入任务标题">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="taskStatus">状态</label>
                        <select id="taskStatus" name="taskStatus">
                            <option value="待办">待办</option>
                            <option value="进行中">进行中</option>
                            <option value="已完成">已完成</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="taskPriority">优先级</label>
                        <select id="taskPriority" name="taskPriority">
                            <option value="高">高</option>
                            <option value="中" selected>中</option>
                            <option value="低">低</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="iterationName">迭代名称</label>
                    <input type="text" id="iterationName" name="iterationName" value="iteration-1" placeholder="例如: iteration-1">
                </div>

                <div class="form-section">
                    <h3>参与人员</h3>
                    <div id="participantsContainer">
                        <div class="participant-row">
                            <input type="text" placeholder="姓名" class="participant-name">
                            <input type="text" placeholder="角色" class="participant-role">
                            <input type="number" placeholder="预估天数" class="participant-days" step="0.5" min="0">
                            <button type="button" class="remove-participant-btn" data-remove-row>×</button>
                        </div>
                    </div>
                    <button type="button" class="add-participant-btn" data-action="add-participant">+ 添加参与人员</button>
                </div>

                <div class="form-section">
                    <h3>审核人员</h3>
                    <div id="reviewersContainer">
                        <div class="participant-row">
                            <input type="text" placeholder="姓名" class="reviewer-name">
                            <input type="text" placeholder="角色" class="reviewer-role">
                            <input type="number" placeholder="预估天数" class="reviewer-days" step="0.5" min="0">
                            <button type="button" class="remove-participant-btn" data-remove-row>×</button>
                        </div>
                    </div>
                    <button type="button" class="add-participant-btn" data-action="add-reviewer">+ 添加审核人员</button>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn-secondary" data-action="close-task-modal">取消</button>
                    <button type="submit" class="btn-primary">添加任务</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 任务详情模态框 -->
    <div class="modal-overlay" id="taskDetailModal">
        <div class="modal detail-modal">
            <div class="modal-header">
                <h2 id="detailTaskTitle">任务详情</h2>
                <button class="modal-close" data-action="close-task-detail" title="关闭">×</button>
            </div>
            <div class="detail-content" id="detailContent">
                <!-- 动态填充任务详情 -->
            </div>
        </div>
    </div>

        <script type="module" src="assets/js/pages/kanban-app.js"></script>
</body>
</html>
